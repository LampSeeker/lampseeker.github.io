{{ define "main" }}
<article class="markdown book-post notion-page">

  <div class="book-post-content notion-page-body markdown-inner">
    {{- .Content -}}
  </div>
</article>
{{ end }}

{{ define "toc" }}
  {{ partial "docs/toc" . }}
{{ end }}

{{ define "footer" }}
  {{ partial "docs/post-prev-next" . }}
{{ end }}
