{{ define "main" }}
{{- $pageClass := cond (eq .RelPermalink "/about/") " notion-page-about" "" -}}
<article class="markdown book-article notion-page{{ $pageClass }}">
  {{ partial "notion/page-header" . }}
  <div class="notion-page-body markdown-inner">
    {{- .Content -}}
  </div>
</article>
{{ end }}
